plugins {
    id 'com.android.application'
}

android {
    namespace 'com.craft.mahjong3d'
    compileSdk 34

    defaultConfig {
        applicationId "com.craft.mahjong3d"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            // APK de debug : signé automatiquement, installable directement
        }
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
